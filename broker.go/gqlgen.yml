schema:
  - internal/graphql/schema/*.graphqls

exec:
  package: generated
  layout: single-file
  filename: internal/graphql/generated/exec.go

model:
  filename: internal/graphql/generated/models.go
  package: generated

resolver:
  package: resolvers
  layout: single-file
  filename: internal/graphql/resolvers/resolver.go
  preserve_resolver: true

omit_complexity: true
omit_root_models: false

models:
  Long:
    model:
      - github.com/99designs/gqlgen/graphql.Int64
  JSON:
    model:
      - github.com/99designs/gqlgen/graphql.Map
      - github.com/99designs/gqlgen/graphql.Any
  ArchiveGroupMutations:
    fields:
      create:    { resolver: true }
      update:    { resolver: true }
      delete:    { resolver: true }
      enable:    { resolver: true }
      disable:   { resolver: true }
  UserManagementMutations:
    fields:
      createUser:     { resolver: true }
      updateUser:     { resolver: true }
      deleteUser:     { resolver: true }
      setPassword:    { resolver: true }
      createAclRule:  { resolver: true }
      updateAclRule:  { resolver: true }
      deleteAclRule:  { resolver: true }
  SessionMutations:
    fields:
      removeSessions: { resolver: true }
  MqttClientMutations:
    fields:
      create:   { resolver: true }
      update:   { resolver: true }
      delete:   { resolver: true }
      start:    { resolver: true }
      stop:     { resolver: true }
      toggle:   { resolver: true }
      reassign: { resolver: true }
  Broker:
    fields:
      metrics:        { resolver: true }
      metricsHistory: { resolver: true }
      sessions:       { resolver: true }
  Session:
    fields:
      metrics:        { resolver: true }
      metricsHistory: { resolver: true }
      subscriptions:  { resolver: true }
      queuedMessageCount: { resolver: true }
  ArchiveGroupInfo:
    fields:
      metrics:          { resolver: true }
      metricsHistory:   { resolver: true }
      connectionStatus: { resolver: true }
  MqttClient:
    fields:
      metrics:        { resolver: true }
      metricsHistory: { resolver: true }
  UserInfo:
    fields:
      aclRules: { resolver: true }
