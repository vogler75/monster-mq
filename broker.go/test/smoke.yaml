NodeId: smoke-test
TCP:  { Enabled: true,  Port: 11883 }
WS:   { Enabled: true,  Port: 11884 }
TCPS: { Enabled: false, Port: 18883 }
WSS:  { Enabled: false, Port: 18884 }
MaxMessageSize: 1048576

DefaultStoreType: SQLITE
SessionStoreType: SQLITE
RetainedStoreType: SQLITE
ConfigStoreType: SQLITE

SQLite:
  Path: ./data/smoke.db

UserManagement:
  Enabled: false
  AnonymousEnabled: true
  AclCacheEnabled: true

Metrics:
  Enabled: true
  CollectionIntervalSeconds: 1
  RetentionHours: 24

Logging:
  Level: INFO

GraphQL:
  Enabled: true
  Port: 18080

Dashboard:
  Enabled: true

Bridges:
  Mqtt:
    Enabled: true
