<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPC UA Browser - MonsterMQ</title>
    <script type="module" src="/js/ix-init.js"></script>
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <script src="/js/storage.js"></script>
    <script src="/js/graphql-client.js"></script>
    <script src="/js/log-viewer.js"></script>
    <script src="/js/sidebar.js"></script>
    <style>
        .opcua-browser-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            height: calc(100vh - 200px);
        }

        .opcua-browser-panel {
            background: var(--dark-surface);
            border-radius: 12px;
            border: 1px solid var(--dark-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--dark-border);
            background: var(--dark-surface-2);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .config-row {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .config-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            min-width: 250px;
        }

        .config-label {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.875rem;
            min-width: 100px;
        }

        .search-container {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .search-input {
            flex: 1;
            padding: 0.75rem;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--monster-purple);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .search-button {
            padding: 0.75rem 1.5rem;
            background: var(--monster-purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-button:hover {
            background: var(--monster-dark);
        }

        .tree-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .tree-node {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.2s;
            user-select: none;
        }

        .tree-item:hover {
            background: rgba(124, 58, 237, 0.1);
        }

        .tree-item.selected {
            background: rgba(124, 58, 237, 0.2);
            color: var(--monster-light);
        }

        .tree-toggle {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }

        .tree-toggle:hover {
            background: var(--dark-border);
            color: var(--text-primary);
        }

        .tree-toggle.expanded {
            transform: rotate(90deg);
        }

        .tree-toggle:empty {
            visibility: hidden;
        }

        .tree-children {
            margin-left: 1.5rem;
            border-left: 1px solid var(--dark-border);
            padding-left: 0.5rem;
        }

        .tree-children.collapsed {
            display: none;
        }

        .tree-icon {
            margin-right: 0.5rem;
            color: var(--text-muted);
        }

        .tree-icon.folder {
            color: var(--monster-purple);
        }

        .tree-icon.variable {
            color: var(--monster-teal);
        }

        .detail-viewer {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .detail-viewer.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
        }

        .data-header {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--dark-border);
        }

        .data-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--monster-light);
            margin-bottom: 0.5rem;
        }

        .data-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-muted);
            min-width: 120px;
            font-size: 0.9rem;
        }

        .detail-value {
            color: var(--text-primary);
            font-size: 0.9rem;
            word-break: break-all;
        }

        .subscription-card {
            background: var(--dark-surface-2);
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-top: 1.5rem;
        }

        .sub-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--monster-light);
            margin: 0 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 0.375rem;
        }

        .form-checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
            font-size: 0.875rem;
            cursor: pointer;
            user-select: none;
        }

        .form-radio-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.375rem;
        }

        .form-radio-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
            font-size: 0.875rem;
            cursor: pointer;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-muted);
            gap: 0.5rem;
        }

        .error-box {
            color: var(--monster-red);
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            margin: 1rem;
            font-size: 0.9rem;
        }

        .success-box {
            color: var(--monster-green);
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <ix-application force-breakpoint="lg">
    <ix-menu application-name="MonsterMQ" pinned start-expanded>
    </ix-menu>
    <div class="main-content" id="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">OPC UA Browser</h1>
                <p class="page-subtitle">Navigate external OPC UA servers and configure subscriptions with wildcards</p>
            </div>

            <div class="opcua-browser-layout">
                <!-- Left Panel: OPC UA Tree -->
                <div class="opcua-browser-panel">
                    <div class="panel-header">
                        <h2 class="panel-title">Address Space</h2>

                        <!-- Config Selector and Starting Node -->
                        <div class="config-row">
                            <div class="config-group">
                                <span class="config-label">UA Client:</span>
                                <select id="server-select" class="search-input" style="cursor: pointer;">
                                    <option value="">Loading...</option>
                                </select>
                            </div>
                        </div>

                        <div class="search-container">
                            <input type="text"
                                   id="start-node-input"
                                   class="search-input"
                                   placeholder="Starting Node ID (e.g. ns=0;i=84)..."
                                   value="ns=0;i=84">
                            <button id="browse-root-btn" class="search-button">Browse</button>
                        </div>
                    </div>
                    <div class="tree-container">
                        <ul id="opcua-tree" class="tree-node">
                            <!-- Tree will be populated here -->
                        </ul>
                    </div>
                </div>

                <!-- Right Panel: Node Details and Subscriptions -->
                <div class="opcua-browser-panel">
                    <div class="panel-header">
                        <h2 class="panel-title">Node details & Subscriptions</h2>
                    </div>
                    <div id="detail-viewer" class="detail-viewer empty">
                        <div>
                            <p>Select an OPC UA node from the tree to view its detailed properties</p>
                            <p style="margin-top: 0.5rem; font-size: 0.875rem;">Expand folders to browse deeper levels</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/opcua-browser.js"></script>
    </ix-application>
</body>
</html>
