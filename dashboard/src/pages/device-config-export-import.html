<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterMQ - Device Configuration Import/Export</title>
    <script type="module" src="/js/ix-init.js"></script>
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <script src="/js/storage.js"></script>
    <script src="/js/graphql-client.js"></script>
    <script src="/js/log-viewer.js"></script>
    <script src="/js/sidebar.js"></script>
    <style>
        /* Main Container */
        .export-import-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .section-card {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        .section-header {
            padding: 1rem 1.5rem;
            background: var(--dark-bg);
            border-bottom: 1px solid var(--dark-border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-header h2 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
        }

        .section-header-icon {
            font-size: 1.25rem;
        }

        .section-body {
            padding: 1.25rem 1.5rem;
        }

        .section-controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .section-controls select {
            padding: 0.35rem 0.6rem;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.8rem;
            cursor: pointer;
            min-width: 160px;
        }

        /* Device Table */
        .device-list {
            max-height: 360px;
            overflow-y: auto;
            border: 1px solid var(--dark-border);
            border-radius: 8px;
            background: var(--dark-bg);
        }

        .device-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        .device-table thead th {
            padding: 0.4rem 0.6rem;
            text-align: left;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--dark-border);
            background: var(--dark-surface);
            position: sticky;
            top: 0;
        }

        .device-table tbody tr {
            border-bottom: 1px solid rgba(71, 85, 105, 0.2);
            transition: background 0.15s ease;
        }

        .device-table tbody tr:last-child {
            border-bottom: none;
        }

        .device-table tbody tr:hover {
            background: rgba(124, 58, 237, 0.06);
        }

        .device-table td {
            padding: 0.3rem 0.6rem;
            vertical-align: middle;
        }

        .device-table td input[type="checkbox"] {
            accent-color: var(--monster-purple);
            cursor: pointer;
        }

        .device-table td label {
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 500;
            margin: 0;
            white-space: nowrap;
        }

        .device-item-info {
            color: var(--text-muted);
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .device-type-badge {
            display: inline-block;
            padding: 0.15rem 0.4rem;
            background: rgba(124, 58, 237, 0.2);
            color: var(--monster-purple);
            border-radius: 4px;
            font-size: 0.68rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .device-enabled { color: var(--monster-green); }
        .device-disabled { color: var(--text-muted); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .selection-info {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-left: auto;
        }

        .selection-info span {
            color: var(--monster-purple);
            font-weight: 600;
        }

        /* File Upload */
        .file-upload-area {
            border: 2px dashed var(--dark-border);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            background: rgba(124, 58, 237, 0.05);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-upload-area:hover {
            border-color: var(--monster-purple);
            background: rgba(124, 58, 237, 0.1);
        }

        .file-upload-area.dragover {
            border-color: var(--monster-purple);
            background: rgba(124, 58, 237, 0.15);
        }

        .file-upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .file-upload-text {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .file-upload-subtext {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        #file-input {
            display: none;
        }

        .file-info {
            padding: 1rem;
            background: var(--dark-bg);
            border-radius: 8px;
            border: 1px solid var(--dark-border);
            margin-top: 1rem;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-info-name {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .file-info-count {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Import Progress */
        .import-progress {
            width: 100%;
            background: var(--dark-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 1rem;
            display: none;
        }

        .import-progress.show {
            display: block;
        }

        .import-progress-bar {
            height: 8px;
            background: linear-gradient(90deg, var(--monster-purple), var(--monster-teal));
            width: 0%;
            transition: width 0.3s ease;
        }

        .import-results {
            background: var(--dark-bg);
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid var(--dark-border);
            margin-top: 1rem;
            display: none;
        }

        .import-results.show {
            display: block;
        }

        .import-result-item {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .import-result-item:last-child {
            margin-bottom: 0;
        }

        .import-result-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--monster-green);
        }

        .import-result-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--monster-red);
        }

        .import-result-icon {
            flex-shrink: 0;
            font-weight: bold;
        }

        .import-result-text {
            flex: 1;
            font-size: 0.875rem;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .action-buttons .btn {
            flex: 1;
        }

        @media (max-width: 768px) {
            .action-buttons { flex-direction: column; }
            .section-controls { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <ix-application force-breakpoint="lg">
    <ix-menu application-name="MonsterMQ" pinned start-expanded>
    </ix-menu>
    <div class="main-content" id="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Device Configuration Management</h1>
                <p class="page-subtitle">Export and import device configurations for backup, migration, or sharing</p>
            </div>

            <div class="export-import-container">
                <!-- Export Section -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-header-icon">📥</div>
                        <h2>Export Configurations</h2>
                    </div>
                    <div class="section-body">
                        <div class="section-controls">
                            <select id="type-filter" onchange="filterDeviceList()">
                                <option value="">All Types</option>
                            </select>
                            <button class="btn btn-secondary" onclick="selectAllDevices()" style="padding: 0.3rem 0.75rem; font-size: 0.8rem;">Select All</button>
                            <button class="btn btn-secondary" onclick="deselectAllDevices()" style="padding: 0.3rem 0.75rem; font-size: 0.8rem;">Deselect All</button>
                            <div id="export-selection-info" class="selection-info" style="display: none;"><span id="export-selected-count">0</span> selected</div>
                            <div style="margin-left: auto; display: flex; gap: 0.5rem;">
                                <button class="btn btn-secondary" onclick="loadExportDevices()" style="padding: 0.3rem 0.75rem; font-size: 0.8rem;">Refresh</button>
                                <button class="btn btn-primary" onclick="exportSelectedDevices()" style="padding: 0.3rem 0.75rem; font-size: 0.8rem;">Export as JSON</button>
                            </div>
                        </div>
                        <div class="device-list" id="export-device-list">
                            <div class="empty-state">
                                <div class="empty-state-icon">📦</div>
                                <div>Loading devices...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Import Section -->
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-header-icon">📤</div>
                        <h2>Import Configurations</h2>
                    </div>
                    <div class="section-body">
                        <input type="file" id="file-input" accept=".json" onchange="handleFileSelect(event)">
                        <div class="file-upload-area" onclick="document.getElementById('file-input').click()" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                            <div class="file-upload-icon">📤</div>
                            <div class="file-upload-text">Click to upload or drag and drop</div>
                            <div class="file-upload-subtext">JSON file with device configurations</div>
                        </div>

                        <div id="file-info" class="file-info">
                            <div class="file-info-name">📄 <span id="file-name"></span></div>
                            <div class="file-info-count"><span id="file-device-count">0</span> device(s) in file</div>
                        </div>

                        <div id="import-device-section" style="display:none; margin-top: 1rem;">
                            <div class="section-controls">
                                <select id="import-type-filter" onchange="filterImportList()">
                                    <option value="">All Types</option>
                                </select>
                                <button class="btn btn-secondary" onclick="selectAllImportDevices()" style="padding: 0.3rem 0.75rem; font-size: 0.8rem;">Select All</button>
                                <button class="btn btn-secondary" onclick="deselectAllImportDevices()" style="padding: 0.3rem 0.75rem; font-size: 0.8rem;">Deselect All</button>
                                <div id="import-selection-info" class="selection-info" style="display: none;"><span id="import-selected-count">0</span> selected</div>
                            </div>
                            <div id="import-device-list" class="device-list"></div>
                        </div>

                        <div id="import-progress" class="import-progress">
                            <div class="import-progress-bar" id="import-progress-bar"></div>
                        </div>

                        <div id="import-results" class="import-results">
                            <div id="import-results-content"></div>
                        </div>

                        <div class="action-buttons" style="margin-top: 1rem;">
                            <button class="btn btn-secondary" onclick="resetImportForm()">Clear File</button>
                            <button class="btn btn-primary" id="import-button" onclick="importDevices()" disabled>Import Configurations</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="error-message" class="error-message" style="display: none;">
                <div class="error-content">
                    <span class="error-icon">⚠️</span>
                    <span class="error-text"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/device-config-export-import.js"></script>
    </ix-application>
</body>
</html>
