<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterMQ - AI Providers</title>
    <script type="module" src="/js/ix-init.js"></script>
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <script src="/js/storage.js"></script>
    <script src="/js/graphql-client.js"></script>
    <script src="/js/log-viewer.js"></script>
    <script src="/js/sidebar.js"></script>
    <style>
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: var(--dark-bg);
            border-bottom: 1px solid var(--dark-border);
            border-radius: 12px 12px 0 0;
        }
        .table-title h2 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 600;
        }
        .table-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            align-items: center;
        }
        .data-table {
            background: var(--dark-surface);
            border-radius: 12px;
            border: 1px solid var(--dark-border);
            overflow-x: auto;
            box-shadow: var(--card-shadow);
        }
        .data-table table {
            margin: 0;
            border-radius: 0;
            border: none;
            background: transparent;
        }
        .data-table thead th {
            background: var(--dark-surface-2);
            padding: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--dark-border);
        }
        .data-table tbody td {
            padding: 0.85rem 1rem;
            vertical-align: middle;
            border-bottom: 1px solid rgba(71, 85, 105, 0.3);
        }
        .data-table tbody tr:hover { background: rgba(71, 85, 105, 0.1); }
        .data-table tbody tr.clickable-row { cursor: pointer; }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-enabled  { background: rgba(16,185,129,0.15); color: var(--monster-green); border: 1px solid rgba(16,185,129,0.3); }
        .status-disabled { background: rgba(239,68,68,0.15);  color: var(--monster-red);   border: 1px solid rgba(239,68,68,0.3);  }
        .type-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(124,58,237,0.15);
            color: var(--monster-light);
            border: 1px solid rgba(124,58,237,0.3);
        }
        .source-badge-config {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            background: rgba(245,158,11,0.15);
            color: #F59E0B;
            border: 1px solid rgba(245,158,11,0.3);
        }
        .source-badge-db {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            background: rgba(59,130,246,0.15);
            color: #3B82F6;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .text-muted { color: var(--text-muted); font-size: 0.85rem; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        .modal-card {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 2rem;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-title { color: var(--text-primary); font-size: 1.1rem; font-weight: 600; margin: 0 0 0.75rem; }
        .modal-body  { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
        .btn-danger  { background: var(--monster-red); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: var(--dark-surface-2); color: var(--text-primary); border: 1px solid var(--dark-border); }
        .btn-secondary:hover { background: var(--dark-border); }
    </style>
</head>
<body>
    <ix-application force-breakpoint="lg">
    <ix-menu application-name="MonsterMQ" pinned start-expanded></ix-menu>
    <div class="main-content" id="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">AI Providers</h1>
                <p class="page-subtitle">Manage GenAI provider configurations</p>
            </div>

            <div class="data-table">
                <div class="table-header">
                    <div class="table-title"><h2>Configured Providers</h2></div>
                    <div class="table-actions">
                        <ix-icon-button icon="refresh" variant="secondary" ghost onclick="genAiProviderManager.loadProviders()" title="Refresh providers"></ix-icon-button>
                        <a href="/pages/genai-provider-detail.html?new=true" class="btn btn-primary" style="text-decoration:none;"><ix-icon name="add-circle" size="16"></ix-icon> Add Provider</a>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Source</th>
                            <th>Model</th>
                            <th>Endpoint</th>
                            <th>Status</th>
                            <th style="text-align:center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="providers-tbody">
                        <tr><td colspan="7" style="text-align:center; color: var(--text-muted); padding: 2rem;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Delete confirmation modal -->
    <div class="modal" id="delete-modal">
        <div class="modal-card">
            <h3 class="modal-title">Delete Provider</h3>
            <p class="modal-body">Are you sure you want to delete <strong id="delete-provider-name"></strong>? This cannot be undone. Any agents referencing this provider will fall back to their own configuration.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="genAiProviderManager.cancelDelete()">Cancel</button>
                <button class="btn btn-danger" onclick="genAiProviderManager.confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script src="/js/genai-providers.js"></script>
    </ix-application>
</body>
</html>
