<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterMQ - Agent Detail Monitor</title>
    <script type="module" src="/js/ix-init.js"></script>
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <script src="/js/storage.js"></script>
    <script src="/js/graphql-client.js"></script>
    <script src="/js/log-viewer.js"></script>
    <script src="/js/sidebar.js"></script>
    <style>
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            cursor: pointer;
        }
        .back-link:hover { color: var(--text-primary); }

        .agent-header {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
        }
        .agent-header-left h1 {
            margin: 0 0 0.25rem 0;
            font-size: 1.5rem;
            color: var(--text-primary);
        }
        .agent-header-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .agent-header-meta span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-running { background: rgba(16,185,129,0.15); color: var(--monster-green); border: 1px solid rgba(16,185,129,0.3); }
        .status-ready { background: rgba(59,130,246,0.15); color: var(--accent-blue); border: 1px solid rgba(59,130,246,0.3); }
        .status-stopped { background: rgba(239,68,68,0.15); color: var(--monster-red); border: 1px solid rgba(239,68,68,0.3); }
        .status-unknown { background: rgba(97,125,145,0.15); color: var(--text-muted); border: 1px solid rgba(97,125,145,0.3); }

        .type-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .type-internal { background: rgba(124,58,237,0.15); color: var(--monster-purple); border: 1px solid rgba(124,58,237,0.3); }
        .type-external { background: rgba(20,184,166,0.15); color: var(--monster-teal); border: 1px solid rgba(20,184,166,0.3); }

        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .health-card {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
        }
        .health-card .label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; }
        .health-card .value { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 1.5rem 0 1rem 0;
        }

        .log-tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--dark-border);
            margin-bottom: 0;
        }
        .log-tab {
            padding: 0.6rem 1.2rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .log-tab:hover { color: var(--text-primary); }
        .log-tab.active { color: var(--monster-purple); border-bottom-color: var(--monster-purple); }

        .log-container {
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-top: none;
            border-radius: 0 0 10px 10px;
            height: 350px;
            overflow-y: auto;
            padding: 1rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }
        .log-entry {
            border-bottom: 1px solid rgba(71,85,105,0.15);
            padding: 0.3rem 0;
        }
        .log-ts { color: var(--text-muted); margin-right: 0.75rem; }
        .log-empty { color: var(--text-muted); font-style: italic; text-align: center; padding: 3rem; }

        .history-controls {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .history-controls .form-group { margin-bottom: 0; }
        .history-controls label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }
        .history-controls input, .history-controls select {
            padding: 0.5rem 0.75rem;
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        .history-controls input:focus, .history-controls select:focus {
            outline: none;
            border-color: var(--monster-purple);
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: var(--monster-purple);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-primary:hover { background: var(--monster-dark); }

        .history-table {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 10px;
            overflow: auto;
            max-height: 400px;
        }
        .history-table table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
            background: transparent;
        }
        .history-table th {
            background: var(--dark-surface-2);
            padding: 0.75rem 1rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.85rem;
            border-bottom: 1px solid var(--dark-border);
            position: sticky;
            top: 0;
        }
        .history-table td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid rgba(71,85,105,0.2);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .history-table .payload-cell {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
        }
        .payload-json {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .ws-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }
        .ws-dot.connected { background: var(--monster-green); }
        .ws-dot.connecting { background: var(--monster-orange); }
    </style>
</head>
<body>
    <ix-application force-breakpoint="lg">
    <ix-menu application-name="MonsterMQ" pinned start-expanded>
    </ix-menu>
    <div class="main-content" id="main-content">
        <div class="container">
            <a class="back-link" id="back-link" href="/pages/agent-monitor.html">
                <ix-icon name="chevron-left" size="16"></ix-icon> Back to Agent Monitor
            </a>

            <div class="agent-header" id="agent-header">
                <div class="agent-header-left">
                    <h1 id="agent-name">Loading...</h1>
                    <div id="agent-description" style="color:var(--text-muted); font-size:0.9rem;"></div>
                    <div class="agent-header-meta">
                        <span id="agent-org-site"></span>
                        <span id="agent-version"></span>
                        <span id="agent-provider-model"></span>
                        <span id="agent-type-badge"></span>
                        <span id="agent-status-badge"></span>
                        <span class="ws-status" id="ws-status">
                            <span class="ws-dot" id="ws-dot"></span>
                            <span id="ws-label">Disconnected</span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Health Metrics -->
            <div class="health-grid" id="health-grid">
                <div class="health-card">
                    <div class="label">Status</div>
                    <div class="value" id="health-status">-</div>
                </div>
                <div class="health-card">
                    <div class="label">Messages Processed</div>
                    <div class="value" id="health-messages">-</div>
                </div>
                <div class="health-card">
                    <div class="label">LLM Calls</div>
                    <div class="value" id="health-llm">-</div>
                </div>
                <div class="health-card">
                    <div class="label">Errors</div>
                    <div class="value" id="health-errors">-</div>
                </div>
                <div class="health-card">
                    <div class="label">Last Updated</div>
                    <div class="value" id="health-timestamp" style="font-size:1rem;">-</div>
                </div>
            </div>

            <!-- History Browser -->
            <h3 class="section-title">History</h3>
            <div class="history-controls">
                <div class="form-group">
                    <label for="history-subtopic">Sub-Topic</label>
                    <select id="history-subtopic">
                        <option value="health">health</option>
                        <option value="inbox/#">inbox</option>
                        <option value="logs/tools">logs/tools</option>
                        <option value="logs/mcp">logs/mcp</option>
                        <option value="logs/llm">logs/llm</option>
                        <option value="logs/errors">logs/errors</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="history-start">Start</label>
                    <input type="datetime-local" id="history-start">
                </div>
                <div class="form-group">
                    <label for="history-end">End</label>
                    <input type="datetime-local" id="history-end">
                </div>
                <div class="form-group">
                    <label for="history-archive">Archive Group</label>
                    <input type="text" id="history-archive" value="Agents" style="width:120px">
                </div>
                <button class="btn-primary" onclick="agentDetailMonitor.loadHistory()">Load</button>
            </div>
            <div class="history-table" id="history-table" style="display:none;">
                <table>
                    <thead>
                        <tr>
                            <th style="width:170px">Timestamp</th>
                            <th style="width:100px">Topic</th>
                            <th>Payload</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body"></tbody>
                </table>
            </div>
            <div id="history-empty" style="display:none; color:var(--text-muted); font-style:italic; padding:1rem;">
                No archived messages found for this time range.
            </div>

            <!-- Live Logs -->
            <h3 class="section-title">Live Logs</h3>
            <div class="log-tabs" id="log-tabs">
                <button class="log-tab active" data-log="tools">Tools</button>
                <button class="log-tab" data-log="mcp">MCP</button>
                <button class="log-tab" data-log="llm">LLM</button>
                <button class="log-tab" data-log="errors">Errors</button>
            </div>
            <div class="log-container" id="log-container">
                <div class="log-empty">Waiting for log messages...</div>
            </div>
        </div>
    </div>
    </ix-application>

    <script src="/js/agent-monitor-detail.js"></script>
</body>
</html>
