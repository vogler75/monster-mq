<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterMQ - Login</title>
    <script type="module" src="/js/ix-init.js"></script>
    <link rel="stylesheet" href="/assets/ix-init.css">
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <style>
        body {
            margin: 0;
            background: var(--theme-color-1);
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
            background: var(--theme-color-1);
        }
        .login-card {
            background: var(--theme-color-2);
            border: 1px solid var(--theme-color-soft-bdr);
            border-radius: 12px;
            padding: 3rem;
            max-width: 420px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header img {
            height: 60px;
            margin-bottom: 1rem;
        }
        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--theme-color-std-text);
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: var(--theme-color-soft-text);
            font-size: 0.875rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--theme-color-std-text);
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--theme-color-1);
            border: 1px solid var(--theme-color-soft-bdr);
            border-radius: 8px;
            color: var(--theme-color-std-text);
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-control::placeholder {
            color: var(--theme-color-soft-text);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--theme-color-primary);
        }
        select.form-control {
            appearance: auto;
            cursor: pointer;
        }

        /* Broker section */
        .broker-section {
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--theme-color-soft-bdr);
        }
        .broker-section .section-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            color: var(--theme-color-soft-text);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .broker-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--theme-color-soft-text);
        }
        .broker-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--theme-color-soft-text);
        }
        .broker-status .dot.connected {
            background: var(--monster-green, #10B981);
        }
        .broker-status .dot.error {
            background: var(--monster-red, #EF4444);
        }
        .login-submit {
            width: 100%;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 8px;
            background: var(--theme-color-primary);
            color: var(--theme-color-primary--contrast, #ffffff);
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        .login-submit:hover:not(:disabled) {
            filter: brightness(1.08);
        }
        .login-submit:disabled {
            opacity: 0.7;
            cursor: wait;
        }
        .guest-separator {
            color: var(--theme-color-soft-text);
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
        }
        .guest-link {
            color: var(--theme-color-primary);
            font-size: 0.875rem;
            text-decoration: none;
        }
        .guest-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="/assets/logo.png" alt="MonsterMQ Logo">
                <h1>Welcome Back</h1>
                <p>Sign in to access your MonsterMQ dashboard</p>
            </div>

            <div class="broker-section">
                <div class="section-label">
                    <ix-icon name="distribution" size="16"></ix-icon>
                    Broker
                </div>
                <div class="form-group" style="margin-bottom: 0.75rem;">
                    <select id="broker-select" class="form-control">
                        <option value="" disabled selected>Loading brokers...</option>
                    </select>
                </div>
                <div id="broker-status" class="broker-status" style="display:none;">
                    <span class="dot" id="broker-status-dot"></span>
                    <span id="broker-status-text"></span>
                </div>
            </div>

            <div id="alert-container"></div>

            <form id="login-form" action="javascript:void(0)" method="post" autocomplete="on">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" autocomplete="username" placeholder="Username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" autocomplete="current-password" placeholder="Password">
                </div>

                <button type="submit" id="login-btn" class="login-submit">Sign In</button>
            </form>

            <div id="guest-access" style="display: none; text-align: center; margin-top: 1.5rem;">
                <div class="guest-separator">- or -</div>
                <a id="guest-link" href="#" class="guest-link">
                    View dashboard (read-only)
                </a>
            </div>
        </div>
    </div>

    <script src="/js/storage.js"></script>
    <script src="/js/broker-manager.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
