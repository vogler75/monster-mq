<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterMQ - AI Provider</title>
    <script type="module" src="/js/ix-init.js"></script>
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <script src="/js/storage.js"></script>
    <script src="/js/graphql-client.js"></script>
    <script src="/js/log-viewer.js"></script>
    <script src="/js/sidebar.js"></script>
    <style>
        .section-card {
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: var(--card-shadow);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--dark-border);
        }
        .section-title h2 { margin: 0; color: var(--text-primary); font-size: 1rem; font-weight: 600; }
        .section-content { padding: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .form-group label { color: var(--text-secondary); font-size: 0.85rem; font-weight: 500; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus { outline: none; border-color: var(--monster-purple); }
        .form-group input:disabled,
        .form-group select:disabled { opacity: 0.6; cursor: not-allowed; }
        .form-group select option { background: var(--dark-surface-2); }
        .action-bar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            padding: 1.5rem 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
        }
        .btn-primary   { background: var(--monster-purple); color: white; }
        .btn-primary:hover { background: var(--monster-dark); }
        .btn-secondary { background: var(--dark-surface-2); color: var(--text-primary); border: 1px solid var(--dark-border); }
        .btn-secondary:hover { background: var(--dark-border); }
        .btn-danger    { background: var(--monster-red); color: white; }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        .alert-success { background: rgba(16,185,129,0.15); color: var(--monster-green); border: 1px solid rgba(16,185,129,0.3); }
        .alert-error   { background: rgba(239,68,68,0.15); color: var(--monster-red);   border: 1px solid rgba(239,68,68,0.3);  }
        .source-notice {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            background: rgba(245,158,11,0.1);
            color: #F59E0B;
            border: 1px solid rgba(245,158,11,0.3);
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <ix-application force-breakpoint="lg">
    <ix-menu application-name="MonsterMQ" pinned start-expanded></ix-menu>
    <div class="main-content" id="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title" id="page-title">AI Provider</h1>
                <p class="page-subtitle" id="page-subtitle">Configure a GenAI provider</p>
            </div>

            <div id="alert-area"></div>

            <div id="provider-content" style="display:none;">
                <div class="section-card">
                    <div class="section-header">
                        <div class="section-title"><h2>Provider Configuration</h2></div>
                    </div>
                    <div class="section-content">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="provider-name">Name</label>
                                <input type="text" id="provider-name" placeholder="e.g. prod-azure" pattern="[a-zA-Z0-9_-]+" required>
                                <small style="color: var(--text-muted);">Letters, digits, underscores and hyphens only</small>
                            </div>
                            <div class="form-group">
                                <label for="provider-type">Provider Type</label>
                                <select id="provider-type" onchange="providerDetailManager.onTypeChange()">
                                    <option value="gemini">Gemini</option>
                                    <option value="claude">Claude</option>
                                    <option value="openai">OpenAI</option>
                                    <option value="ollama">Ollama</option>
                                    <option value="azure-openai">Azure OpenAI</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="provider-model">Model / Deployment</label>
                                <input type="text" id="provider-model" placeholder="gemini-2.0-flash">
                            </div>
                            <div class="form-group">
                                <label for="provider-api-key">API Key</label>
                                <input type="password" id="provider-api-key" placeholder="Leave blank to keep existing">
                                <small style="color: var(--text-muted);">Stored securely. Displayed as *** when set.</small>
                            </div>
                            <div class="form-group" id="provider-endpoint-group" style="display:none;">
                                <label for="provider-endpoint" id="provider-endpoint-label">Endpoint</label>
                                <input type="text" id="provider-endpoint" placeholder="https://&lt;resource&gt;.openai.azure.com/">
                            </div>
                            <div class="form-group" id="provider-service-version-group" style="display:none;">
                                <label for="provider-service-version">Azure API Version</label>
                                <input type="text" id="provider-service-version" placeholder="e.g. 2024-12-01-preview">
                            </div>
                            <div class="form-group" id="provider-base-url-group" style="display:none;">
                                <label for="provider-base-url">Ollama Base URL</label>
                                <input type="text" id="provider-base-url" placeholder="http://localhost:11434">
                            </div>
                            <div class="form-group">
                                <label for="provider-temperature">Default Temperature</label>
                                <input type="number" id="provider-temperature" step="0.1" min="0" max="2" value="0.7">
                            </div>
                            <div class="form-group">
                                <label for="provider-max-tokens">Default Max Tokens</label>
                                <input type="number" id="provider-max-tokens" placeholder="Provider default">
                            </div>
                            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; padding-top: 1.5rem;">
                                <input type="checkbox" id="provider-enabled" checked style="accent-color: var(--monster-purple);">
                                <label for="provider-enabled" style="margin: 0; cursor: pointer;">Enabled</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Timestamps Section -->
                <div class="section-card" id="timestamps-section" style="display: none;">
                    <div class="section-header">
                        <div class="section-title"><h2>Timestamps</h2></div>
                    </div>
                    <div class="section-content">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Created At</label>
                                <div id="created-at" style="color: var(--text-primary); font-weight: 500; padding: 0.5rem 0.75rem; background: var(--dark-bg); border-radius: 6px; border: 1px solid var(--dark-border);">-</div>
                            </div>
                            <div class="form-group">
                                <label>Updated At</label>
                                <div id="updated-at" style="color: var(--text-primary); font-weight: 500; padding: 0.5rem 0.75rem; background: var(--dark-bg); border-radius: 6px; border: 1px solid var(--dark-border);">-</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn btn-primary" id="save-btn" onclick="providerDetailManager.save()">Save Provider</button>
                    <button class="btn btn-secondary" onclick="window.navigateTo('/pages/genai-providers.html')">Cancel</button>
                    <button class="btn btn-danger" id="delete-btn" style="display:none; margin-left:auto;" onclick="providerDetailManager.deleteProvider()">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/genai-provider-detail.js"></script>
    </ix-application>
</body>
</html>
