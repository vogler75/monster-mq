<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterMQ - Agent Graph</title>
    <script type="module" src="/js/ix-init.js"></script>
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="/js/storage.js"></script>
    <script src="/js/graphql-client.js"></script>
    <script src="/js/log-viewer.js"></script>
    <script src="/js/sidebar.js"></script>
    <style>
        .graph-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .graph-controls label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-right: 0.3rem;
        }
        .graph-controls select, .graph-controls button {
            padding: 0.4rem 0.8rem;
            background: var(--dark-surface);
            border: 1px solid var(--dark-border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .graph-controls select:focus { outline: none; border-color: var(--monster-purple); }
        .graph-controls button:hover { background: var(--dark-surface-2); }

        .graph-wrapper {
            background: var(--dark-bg);
            border: 1px solid var(--dark-border);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        #agent-graph {
            width: 100%;
            height: calc(100vh - 280px);
            min-height: 500px;
        }

        .graph-legend {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
            padding: 0.75rem 1.25rem;
            border-top: 1px solid var(--dark-border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-line {
            width: 24px;
            height: 2px;
            border-radius: 1px;
        }
        .legend-border-solid {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            background: transparent;
        }
        .legend-border-dashed {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px dashed var(--text-muted);
            background: transparent;
        }

        .ws-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: auto;
        }
        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }
        .ws-dot.connected { background: var(--monster-green); }
        .ws-dot.connecting { background: var(--monster-orange); }
    </style>
</head>
<body>
    <ix-application force-breakpoint="lg">
    <ix-menu application-name="MonsterMQ" pinned start-expanded>
    </ix-menu>
    <div class="main-content" id="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Agent Network</h1>
                <p class="page-subtitle">Live visualization of agent interactions</p>
            </div>

            <div class="graph-controls">
                <div>
                    <label for="layout-type">Layout:</label>
                    <select id="layout-type" onchange="agentGraph.onLayoutChange()">
                        <option value="force">Force</option>
                        <option value="circular" selected>Circular</option>
                    </select>
                </div>
                <button onclick="agentGraph.refresh()">
                    <ix-icon name="refresh" size="16"></ix-icon> Refresh
                </button>
                <span class="ws-status" id="ws-status">
                    <span class="ws-dot" id="ws-dot"></span>
                    <span id="ws-label">Disconnected</span>
                </span>
            </div>

            <div class="graph-wrapper">
                <div id="agent-graph"></div>
                <div class="graph-legend">
                    <span class="legend-item"><span class="legend-dot" style="background:#10B981"></span> Running</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#3B82F6"></span> Ready</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#EF4444"></span> Stopped</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#617d91"></span> Unknown</span>
                    <span style="margin-left:0.5rem; border-left:1px solid var(--dark-border); padding-left:1rem;">
                        <span class="legend-item"><span class="legend-border-solid"></span> Internal</span>
                        <span class="legend-item"><span class="legend-border-dashed"></span> External</span>
                    </span>
                    <span style="margin-left:0.5rem; border-left:1px solid var(--dark-border); padding-left:1rem;">
                        <span class="legend-item"><span class="legend-line" style="background:rgba(124,58,237,0.6)"></span> Agent call</span>
                    </span>
                </div>
            </div>
        </div>
    </div>
    </ix-application>

    <script src="/js/agent-online.js"></script>
</body>
</html>
