<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterMQ</title>
    <script type="module" src="/js/ix-init.js"></script>
    <link rel="stylesheet" href="/assets/ix-init.css">
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <link rel="stylesheet" href="/assets/ix-app.css">
    <script src="/js/storage.js"></script>
    <script src="/js/broker-manager.js"></script>
    <script src="/js/graphql-client.js"></script>
    <script src="/js/log-viewer.js"></script>
    <script>window.__SPA_MODE = true;</script>
    <script src="/js/sidebar.js"></script>
</head>
<body>
    <ix-application force-breakpoint="lg">
        <ix-application-header name="MonsterMQ" slot="application-header">
            <img src="/assets/logo.png" alt="MonsterMQ" slot="logo"
                 style="height:32px;width:32px;border-radius:4px;">
            <div id="auth-status-indicator" class="auth-status-indicator" hidden></div>
        </ix-application-header>

        <ix-menu application-name="MonsterMQ" pinned start-expanded>
        </ix-menu>

        <div class="main-content" id="main-content">
            <div class="container" id="page-content">
                <p style="text-align:center;padding:4rem;color:var(--text-muted);">Loading...</p>
            </div>
        </div>
    </ix-application>

    <div id="log-viewer-container"></div>
</body>
</html>
