TCP: 1885

NodeName: "node3"

MaxMessageSizeKb: 512
QueuedMessagesEnabled: true

DefaultStoreType: POSTGRES

# User Management configuration
UserManagement:
  Enabled: false  # Set to true to enable user authentication and ACL
  PasswordAlgorithm: bcrypt
  CacheRefreshInterval: 60  # seconds
  DisconnectOnUnauthorized: true

Metrics:
  Enabled: true
  RetentionHours: 1   # Default 1 day
  CollectionInterval: 10  # Collection interval in seconds (default: 1)

GraphQL:
  Enabled: true
  Port: 4003
  Path: /graphql

# PostgreSQL configuration
Postgres:
  Url: jdbc:postgresql://192.168.1.35:5432/monster-cluster
  User: system
  Pass: manager

# CrateDB configuration
CrateDB:
  Url: jdbc:postgresql://192.168.1.35:5433/monster-cluster
  User: crate
  Pass: ""

# MongoDB configuration
MongoDB:
  Url: mongodb://system:manager@192.168.1.35:27017
  Database: monster-cluster
