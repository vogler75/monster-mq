# GenAI Configuration Example for MonsterMQ
# Add this section to your config.yaml to enable AI-supported features

# Enable GraphQL server (required for GenAI to work)
GraphQL:
  Enabled: true
  Port: 4000
  Path: /graphql
  CorsEnabled: true

# GenAI Configuration
GenAI:
  # Enable GenAI integration
  Enabled: true

  # Per-provider API keys (shared by Assistant and Agents)
  Providers:
    Gemini:
      ApiKey: "${GEMINI_API_KEY}"
    Claude:
      ApiKey: "${ANTHROPIC_API_KEY}"
    OpenAI:
      ApiKey: "${OPENAI_API_KEY}"
    Ollama:
      BaseUrl: "http://localhost:11434"
    AzureOpenAI:
      ApiKey: "${AZURE_OPENAI_API_KEY}"
      Endpoint: "${AZURE_OPENAI_ENDPOINT}"   # e.g. https://<resource>.openai.azure.com/
      Deployment: "gpt-4o"                    # default deployment name used as model
      ServiceVersion: "2024-12-01-preview"    # Azure OpenAI API version (optional)

  # Internal AI assistant (script editor, topic analysis)
  Assistant:
    Provider: "gemini"              # gemini | claude | openai | ollama | azure-openai
    Model: "gemini-2.5-flash"
    Temperature: 0.7
    DocsPath: "docs"

# Example GraphQL Query
# Once configured, you can query the GenAI endpoint:
#
# query {
#   genai {
#     ask(
#       prompt: "How do I subscribe to MQTT topics using JavaScript?"
#       docs: ["workflow.md"]
#     ) {
#       response
#       model
#       error
#     }
#   }
# }
#
# With context:
# query {
#   genai {
#     ask(
#       prompt: "Generate a function to publish temperature data"
#       context: "I'm using a DHT22 sensor that outputs JSON"
#       docs: ["javascript-api.md"]
#     ) {
#       response
#       model
#     }
#   }
# }
