# MonsterMQ Configuration - Memory Only
# This configuration uses only in-memory storage (no persistence)
# Suitable for testing, development, or ephemeral deployments

# Network Configuration
TCP: 1883
WS: 8080
TCPS: 0     # Disabled
WSS: 0      # Disabled
MaxMessageSizeKb: 8

# Memory-first storage configuration
SessionStoreType: MEMORY
RetainedStoreType: MEMORY
QueueStoreType: MEMORY
ConfigStoreType: SQLITE

# Enable queued messages (stored in a dedicated in-memory SQLite queue DB)
QueuedMessagesEnabled: true

# SQLite configuration remains file-backed for broker configuration.
# Runtime sessions, subscriptions, retained messages, and queues are volatile.
SQLite:
  Path: "sqlite"

# MCP Server configuration
MCP:
  Enabled: true
  Port: 3000

# Note: When using this configuration:
# - Runtime session, subscription, retained, and queued message data is lost on broker restart
# - Broker configuration remains persisted in SQLite
# - Fast performance (no disk I/O)
# - Suitable for testing and development
# - Not recommended for production use
Logging:
  Memory:
    Enabled: false
    Entries: 1000
