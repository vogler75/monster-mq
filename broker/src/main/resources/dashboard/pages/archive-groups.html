<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonsterMQ - Archives</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/monster-theme.css">
    <script src="/js/storage.js"></script>
    <script src="/js/graphql-client.js"></script>
    <script src="/js/log-viewer.js"></script>
    <script src="/js/sidebar.js"></script>
    <style>
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-enabled {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
        }

        .status-disabled {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .topic-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            max-width: 200px;
        }

        .topic-filter-tag {
            background: var(--background-secondary);
            color: var(--text-secondary);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .action-buttons { display:flex; gap:0.5rem; flex-wrap:wrap; }

        /* Connection Status Indicators */
        .connection-indicators {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }

        .connection-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .connection-dot.connected {
            background-color: var(--accent-green);
            box-shadow: 0 0 4px rgba(16, 185, 129, 0.5);
        }

        .connection-dot.disconnected {
            background-color: var(--accent-red);
            box-shadow: 0 0 4px rgba(239, 68, 68, 0.5);
        }

        .connection-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- Mobile Top Bar -->
    <div class="top-bar">
        <div class="sidebar-brand">
            <img src="/assets/logo.png" alt="MonsterMQ Logo">
            <span class="brand-name">MonsterMQ</span>
        </div>
        <button class="mobile-menu-toggle" onclick="toggleSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <img src="/assets/logo.png" alt="MonsterMQ Logo">
                <span class="brand-name">MonsterMQ</span>
            </div>
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15,18 9,12 15,6"></polyline>
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav"></nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar" id="user-avatar">
                    U
                </div>
                <div class="user-details">
                    <div class="user-name" id="user-name">User</div>
                    <div class="user-role">Administrator</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="main-content" id="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Archive Management</h1>
                <p class="page-subtitle">Manage MQTT message archiving configurations</p>
            </div>

            <div class="data-table">
                <div class="table-header">
                    <div class="table-title">
                        <h2>Archive Groups</h2>
                    </div>
                    <div class="table-actions">
                        <a href="/pages/archive-group-detail.html?new=true" class="btn btn-primary">+ Create Archive Group</a>
                        <button id="refresh-archives" class="btn btn-secondary" onclick="archiveGroupsManager.loadArchiveGroups()">
                            <span>Refresh</span>
                        </button>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Topic Filters</th>
                            <th>Stores (LV/AR)</th>
                            <th>Payload Format</th>
                            <th>Retained Only</th>
                            <th>Out / Buffer</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="archive-groups-tbody">
                        <tr>
                            <td colspan="8" style="text-align: center; padding: 2rem;">
                                Loading archive groups...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/archive-groups.js"></script>
</body>
</html>
